<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulário (nome)</h1><br>
    <form>
    <label>Nome:</label>
    <input type="text"><br><br>
    <label>Senha:</label>
    <input type="password"><br><br>
    <label>Sugestão</label>
    <textarea rows="10" cols="10" maxlength="10" minlength="10"></textarea>
    <br><br> <!--separação das linhas-->
    <select><!--Seleção/opção-->
        <option>Aragarças/Go</option><!--Opção-->
        <option>Pontal/MT</option>
        <option>Barra do Garças/MT</option><br><br>
    </select>
<br><br>
    <label>opção: </label>
        <input type="radio" name="opção" checked>
        <label>sim</label>
        <input type="radio" name="opção">
        <label>não</label><br><br>

        <label>preferências:</label><br>
        <input type="checkbox">
        <label>praia</label><br>
        <input type="checkbox">
        <label>cachoeira</label><br>
        <input type="checkbox">
        <label>águas termicas</label><br>
        <input type="color"><br>
        <input type="date"><br>
        <input type="datetime-local"><br>
        <button>Enviar</button> <button>reset</button><br>

    </form>

</body>
</html>
